<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - StockWise</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>StockWise Login</h1>

<p>Please sign in to access the inventory management system.</p>

<div th:if="${param.error}" style="color:red;">
    Invalid username or password.
</div>

<div th:if="${param.logout}" style="color:green;">
    You have been logged out successfully.
</div>

<form th:action="@{/login}" method="post">
    <div>
        <label for="username">Username:</label>
        <input id="username" name="username" type="text" required>
    </div>

    <br>

    <div>
        <label for="password">Password:</label>
        <input id="password" name="password" type="password" required>
    </div>

    <br>

    <button type="submit">Login</button>
</form>

<p>
    Demo credentials: <strong>admin</strong> / <strong>password123</strong>
</p>

</body>
</html>
